# Especificación de OpenAPI utilizada (Versión 3.1.0)
openapi: "3.1.0"

# Información general del contrato de la API
info:
  title: "Inscripciones API"
  version: "2.0.0" # Versión global actual del contrato
  description: Contrato de API para la gestión de inscripciones de estudiantes.
  license:
    name: "MIT"
    identifier: "MIT"

# Definición de los servidores donde corre la API (en este caso, tu entorno de desarrollo local)
servers:
  - url: http://127.0.0.1:3000
    description: "Servidor local"

# Mapeo y definición de todas las rutas (endpoints) disponibles en tu backend
paths:
    # ENDPOINT 1: VERIFICACIÓN DE ESTADO DEL SERVIDOR
  /health:
    get:
      summary: Verificar el estado del servidor
      description: Retorna el estado actual de la API junto con una marca de tiempo.
      operationId: checkHealth
      security: [] # Se indica explícitamente vacío porque es una ruta pública (sin ApiKey)
      responses:
        '200': # Respuesta exitosa si el servidor está levantado
          description: El servidor está operativo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  ts:
                    type: string
                    format: date-time
                    example: "2026-06-23T18:15:00.000Z"
        '400': # Agregado para cumplir estrictamente con la regla operation-4xx-response de Redocly
          description: Petición incorrecta o mal estructurada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRespuesta'
              example:
                error: "Solicitud de estado del servidor inválida"

  # ENDPOINT 2: CREACIÓN DE INSCRIPCIONES (VERSIÓN 1)

  /v1/inscripciones:
    post:
      summary: Crear una nueva inscripción (Versión 1)
      description: Registra la inscripción de un estudiante sin requerir método de pago de forma obligatoria.
      operationId: crearInscripcionV1
      security: [] # Tampoco requiere ApiKey porque la seguridad se implementó a partir de la v2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              # Hace referencia al esquema de validación de datos de entrada de la v1
              $ref: '#/components/schemas/InscripcionInputV1'
            examples:
              PeticionExitosaV1:
                summary: Petición con datos válidos para v1
                value:
                  estudianteId: "EST-45678"
                  materias: ["Programación", "Redes"]
                  periodoId: "PER-2026A"
      responses:
        '201': # Código HTTP para recurso creado con éxito
          description: Inscripción creada exitosamente en v1.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InscripcionExitosaV1'
              example:
                version: "v1"
                message:
                  estudianteId: "EST-45678"
                  materias: 
                    - "Programación"
                    - "Redes"
                  periodoId: "PER-2026A"
        '400': # Manejo de errores de validación de campos obligatorios en v1
          description: Error por campos obligatorios faltantes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRespuesta'
              example:
                error: "Campos requeridos: estudianteId, materias, periodoId"

  
  # ENDPOINT 3: CREACIÓN DE INSCRIPCIONES (VERSIÓN 2)
  
  /v2/inscripciones:
    post:
      summary: Crear una nueva inscripción (Versión 2)
      description: Registra la inscripción de un estudiante en un periodo y materias específicas, exigiendo y validando el método de pago.
      operationId: crearInscripcionV2
      security:
        - ApiKeyAuth: [] # Obliga el uso de x-api-key mediante tu middleware auth.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              # Hace referencia al esquema de v2 (que incluye el método de pago)
              $ref: '#/components/schemas/InscripcionInputV2'
            examples:
              PeticionExitosaV2:
                summary: Petición con datos correctos para v2
                value:
                  estudianteId: "EST-90210"
                  materias: ["Programación", "Bases de Datos"]
                  periodoId: "PER-2026A"
                  metodo_pago: "Efectivo"
      responses:
        '201': # Respuesta exitosa en v2
          description: Inscripción creada exitosamente en v2.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InscripcionExitosaV2'
              example:
                version: "v2"
                message:
                  estudianteId: "EST-90210"
                  materias: 
                    - "Programación"
                    - "Bases de Datos"
                  periodoId: "PER-2026A"
                  metodo_pago: "Efectivo"
        '400': # Manejo de errores específicos de validación de v2 (ej. método de pago inválido)
          description: Error de validación (campos faltantes o método de pago inválido).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRespuesta'
              examples:
                CamposFaltantes:
                  summary: Error por campos faltantes
                  value:
                    error: "Campos requeridos: estudianteId, materias, periodoId, metodo_pago"
                MetodoPagoInvalido:
                  summary: Error por método de pago no permitido
                  value:
                    error: "El metodo de pago insertado debe ser, Efectivo, Trasferencia, Debito, Credito"
        '500': # Error del lado del servidor
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRespuesta'
              example:
                error: "Error interno del servidor"

# Componentes reutilizables de la API (Esquemas de Datos y Seguridad)
components:
  
  # Definición del método de autenticación por API Key en la cabecera
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API Key requerida para acceder a los endpoints protegidos.
  
  # Definición de las estructuras de datos (Modelos/Esquemas)
  schemas:
    
    # Estructura requerida para enviar datos a la Versión 1
    InscripcionInputV1:
      type: object
      required:
        - estudianteId
        - materias
        - periodoId
      properties:
        estudianteId:
          type: string
          description: ID único del estudiante.
        materias:
          type: array
          items:
            type: string
          minItems: 1
          description: Arreglo de materias a las que se inscribe.
        periodoId:
          type: string
          description: Periodo académico de la inscripción.

    # Estructura requerida para enviar datos a la Versión 2 (Añade método de pago obligatorio con enum)
    InscripcionInputV2:
      type: object
      required:
        - estudianteId
        - materias
        - periodoId
        - metodo_pago
      properties:
        estudianteId:
          type: string
          description: ID único del estudiante.
        materias:
          type: array
          items:
            type: string
          minItems: 1
          description: Arreglo de materias a las que se inscribe.
        periodoId:
          type: string
          description: Periodo académico de la inscripción.
        metodo_pago:
          type: string
          enum: ['Efectivo', 'Trasferencia', 'Debito', 'Credito'] # Restricción de valores válidos
          description: Método de pago. Debe coincidir exactamente con los valores permitidos.
    
    # Estructura que retorna el servidor tras un registro exitoso en v1
    InscripcionExitosaV1:
      type: object
      properties:
        version:
          type: string
          example: "v1"
        message:
          $ref: '#/components/schemas/InscripcionInputV1'

    # Estructura que retorna el servidor tras un registro exitoso en v2
    InscripcionExitosaV2:
      type: object
      properties:
        version:
          type: string
          example: "v2"
        message:
          $ref: '#/components/schemas/InscripcionInputV2'
          
    # Esquema genérico para el formateo de mensajes de error en la API
    ErrorRespuesta:
      type: object
      properties:
        error:
          type: string
          description: Detalle o descripción del error.